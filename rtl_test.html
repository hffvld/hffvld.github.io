<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RTL Origin Indicator Test Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      font-size: 1.4rem;
    }

    .field-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .note {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 12px;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>RTL Domain Rendering - Origin Indicator Test</h1>

  <div class="note">
    <strong>Instructions:</strong> Tap either input field below to trigger
    the virtual keyboard. Observe the origin indicator displayed above
    the keyboard and verify it shows the correct eTLD+1 domain, not a
    visually reordered trusted domain.
  </div>

  <div class="field-group">
    <label for="email">Email</label>
    <input
      type="email"
      id="email"
      name="email"
      placeholder="Enter email address"
      autocomplete="off"
    />
  </div>

  <div class="field-group">
    <label for="phone">Phone</label>
    <input
      type="tel"
      id="phone"
      name="phone"
      placeholder="Enter phone number"
      autocomplete="off"
    />
  </div>

</body>
</html>
